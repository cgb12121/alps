# Test profile: Use same MySQL DB as main app (with @Transactional rollback in integration tests)
spring.datasource.url=jdbc:mysql://localhost:3306/alps
spring.datasource.username=dev
spring.datasource.password=dev
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Disable Camunda client so tests run without Zeebe
camunda.client.enabled=false
