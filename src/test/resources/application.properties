# Test profile: H2 in-memory, Camunda client disabled so tests run without Zeebe
spring.datasource.url=jdbc:h2:mem:alps;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Disable Camunda client so context loads without Zeebe
camunda.client.enabled=false
