spring.application.name=alps
spring.threads.virtual.enabled=true

# MySQL Config
spring.datasource.url=jdbc:mysql://localhost:3306/alps
spring.datasource.username=dev
spring.datasource.password=dev
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# Camunda 8
camunda.client.enabled=true
camunda.client.grpc-address=http://127.0.0.1:26500
camunda.client.prefer-rest-over-grpc=false
camunda.workflow.deploy-on-startup=true

# Log Drools + Camunda
logging.level.root=INFO
logging.level.io.camunda=DEBUG
logging.level.org.drools=DEBUG
logging.level.me.mb.alps.infrastructure.workflow=DEBUG
logging.level.me.mb.alps.infrastructure.rules=DEBUG

# Notification (optional)
 alps.notification.mail.enabled=false
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your@gmail.com
# spring.mail.password=app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# JWT (Nimbus HS256): secret min 32 bytes; validity ms
alps.jwt.secret=PR9uK6JaOpPDlekIOYLUUfhqx5UaoiZF0J1yd+sero4=
alps.jwt.validity-ms=86400000
alps.security.dev-default-password=dev

alps.loan.auto-generate-schedule=true

# Quartz:JDBC JobStore (persistent)
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always