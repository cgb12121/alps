spring.application.name=alps
spring.threads.virtual.enabled=true

# MySQL Config
spring.datasource.url=jdbc:mysql://localhost:3306/alps
spring.datasource.username=dev
spring.datasource.password=dev
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Lưu UUID dạng chuỗi 36 ký tự (char(36)), tránh lỗi "Incorrect string value" khi dùng binary
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# Camunda 8: bật client + worker thì mới start process và chạy Drools (score-loan)
camunda.client.enabled=true
camunda.client.grpc-address=http://127.0.0.1:26500
# Dùng gRPC (không dùng REST) để tránh MalformedResponseException với Zeebe
camunda.client.prefer-rest-over-grpc=false
camunda.workflow.deploy-on-startup=true
# Log Drools + Camunda để thấy khi submit loan
logging.level.root=INFO
logging.level.io.camunda=DEBUG
logging.level.org.drools=DEBUG
logging.level.me.mb.alps.infrastructure.workflow=DEBUG
logging.level.me.mb.alps.infrastructure.rules=DEBUG

# Notification (optional): khi APPROVED/REJECTED gửi mail hoặc Slack
# alps.notification.mail.enabled=true
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your@gmail.com
# spring.mail.password=app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true
# alps.notification.slack.webhook-url=https://hooks.slack.com/services/...

# JWT (Nimbus HS256): secret min 32 bytes; validity ms
alps.jwt.secret=alps-jwt-secret-key-at-least-32-bytes-long-for-hs256
alps.jwt.validity-ms=86400000
# Dev: password chung cho mọi user khi chưa lưu password trong DB
alps.security.dev-default-password=dev