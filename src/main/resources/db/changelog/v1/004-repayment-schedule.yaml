databaseChangeLog:
  - changeSet:
      id: 011-repayment-schedule
      author: alps
      objectQuotingStrategy: QUOTE_ALL_OBJECTS
      changes:
        - createTable:
            tableName: repayment_schedules
            columns:
              - column: { name: id, type: char(36), constraints: { primaryKey: true } }
              - column: { name: loan_application_id, type: char(36), constraints: { nullable: false } }
              - column: { name: installment_number, type: int, constraints: { nullable: false } }
              - column: { name: due_date, type: date, constraints: { nullable: false } }
              - column: { name: principal_amount, type: "decimal(19,4)", constraints: { nullable: false } }
              - column: { name: interest_amount, type: "decimal(19,4)", constraints: { nullable: false } }
              - column: { name: total_amount, type: "decimal(19,4)", constraints: { nullable: false } }
              - column: { name: paid_amount, type: "decimal(19,4)", defaultValue: "0" }
              - column: { name: status, type: varchar(32), constraints: { nullable: false }, defaultValue: PENDING }
              - column: { name: paid_date, type: date }
        - addForeignKeyConstraint:
            baseTableName: repayment_schedules
            baseColumnNames: loan_application_id
            referencedTableName: loan_applications
            referencedColumnNames: id
            constraintName: fk_repayment_schedules_loan
        - createIndex:
            indexName: idx_repayment_schedules_due_date_status
            tableName: repayment_schedules
            columns:
              - column: { name: due_date }
              - column: { name: status }
