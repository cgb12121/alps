databaseChangeLog:
  - changeSet:
      id: 009-users-role-password
      author: alps
      objectQuotingStrategy: QUOTE_ALL_OBJECTS
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: role
                  type: varchar(32)
                  defaultValue: CUSTOMER
                  constraints: { nullable: false }
        - addColumn:
            tableName: users
            columns:
              - column: { name: password_hash, type: varchar(255) }
        - addColumn:
            tableName: users
            columns:
              - column: { name: customer_id, type: char(36) }
