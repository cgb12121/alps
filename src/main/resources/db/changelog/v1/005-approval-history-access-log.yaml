databaseChangeLog:
  - changeSet:
      id: 012-approval-history-access-log
      author: alps
      objectQuotingStrategy: QUOTE_ALL_OBJECTS
      changes:
        - createTable:
            tableName: approval_histories
            columns:
              - column: { name: id, type: char(36), constraints: { primaryKey: true } }
              - column: { name: loan_application_id, type: char(36), constraints: { nullable: false } }
              - column: { name: approved_by, type: char(36), constraints: { nullable: false } }
              - column: { name: old_status, type: varchar(32) }
              - column: { name: new_status, type: varchar(32), constraints: { nullable: false } }
              - column: { name: comment, type: varchar(1000) }
              - column: { name: created_at, type: datetime(6), constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: approval_histories
            baseColumnNames: loan_application_id
            referencedTableName: loan_applications
            referencedColumnNames: id
            constraintName: fk_approval_histories_loan
        - addForeignKeyConstraint:
            baseTableName: approval_histories
            baseColumnNames: approved_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_approval_histories_user
        - createIndex:
            indexName: idx_approval_histories_loan
            tableName: approval_histories
            columns:
              - column: { name: loan_application_id }
        - createIndex:
            indexName: idx_approval_histories_approved_by
            tableName: approval_histories
            columns:
              - column: { name: approved_by }
        # loan_access_logs table removed from model – keep history here, or handle via separate migration if needed
